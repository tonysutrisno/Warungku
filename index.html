<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Warung</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background: #f4f4f4; }
        #video { width: 100%; max-width: 400px; border: 4px solid #2ecc71; border-radius: 10px; background: black; }
        .box { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .harga { font-size: 30px; color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🏪 Kasir Warung Pintar</h1>
    <video id="video"></video>
    <div class="box">
        <div id="nama" style="font-size:20px; font-weight:bold;">Arahkan ke Barcode Barang</div>
        <div id="harga" class="harga">Rp 0</div>
    </div>
    <script>
        const database = {
            "8992345678901": { nama: "Mie Instan Goreng", harga: 3500 },
            "8999999195804": { nama: "Teh Kotak Sosro", harga: 5000 },
            "899886610023": { nama: "Air Mineral 600ml", harga: 4000 }
        };
        const codeReader = new ZXing.BrowserMultiFormatReader();
        codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
            if (result) {
                const kode = result.text;
                if (database[kode]) {
                    document.getElementById("nama").innerText = database[kode].nama;
                    document.getElementById("harga").innerText = "Rp " + database[kode].harga.toLocaleString('id-ID');
                } else {
                    document.getElementById("nama").innerText = "Barang Baru (" + kode + ")";
                    document.getElementById("harga").innerText = "Rp 0";
                }
            }
        });
    </script>
</body>
</html>
